<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Admin Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    
    <div class="layer-blur"></div>
    <div class="container">
        <header>
            <h1 class="logo">Payroll Admin Login</h1>
        </header>
        <div class="login-blur-box">
            <form>
                <input type="text" placeholder="Username" class="login-input" required>
                <input type="password" placeholder="Password" class="login-input" required>
                <button type="submit" class="btn-signing">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
